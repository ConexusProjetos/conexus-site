services:
  migrate:
    build:
      context: .
      target: migrator
    env_file: .env.production
    restart: "no"
    networks:
      - private

  app:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://conexus.tech}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
    env_file: .env.production
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik-public}
      - traefik.http.services.conexus.loadbalancer.server.port=3000
      - traefik.http.routers.conexus.rule=Host(`conexus.tech`) || Host(`www.conexus.tech`)
      - traefik.http.routers.conexus.entrypoints=websecure
      - traefik.http.routers.conexus.tls=true
      - traefik.http.routers.conexus.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}
      - traefik.http.routers.conexus.service=conexus
      - traefik.http.routers.conexus-api.rule=Host(`api.conexus.tech`)
      - traefik.http.routers.conexus-api.entrypoints=websecure
      - traefik.http.routers.conexus-api.tls=true
      - traefik.http.routers.conexus-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}
      - traefik.http.routers.conexus-api.service=conexus
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - traefik
      - private

networks:
  # Must match the external Docker network already used by the Traefik stack.
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-public}
  private:
